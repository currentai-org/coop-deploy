events {
    worker_connections 16384;           # Doubled from 8192
    use epoll;                          # Efficient event mechanism for Linux
    multi_accept on;                    # Accept multiple connections at once
}

http {
    # Performance optimizations
    sendfile on;                        # Efficient file serving
    tcp_nopush on;                      # Send headers in one packet
    tcp_nodelay on;                     # Don't buffer data, send immediately
    keepalive_timeout 75s;              # Keep connections alive longer
    keepalive_requests 1000;            # More requests per connection

    # Buffer sizes (optimized for streaming)
    proxy_buffering off;                # CRITICAL: Disable buffering for streaming
    proxy_request_buffering off;        # Don't buffer request body
    client_body_buffer_size 128k;
    client_max_body_size 10m;

    # Connection upgrade mapping for WebSocket
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    upstream cg-server {
        server cg-server:8080;
        keepalive 128;
        keepalive_requests 1000;
        keepalive_timeout 75s;
    }

    upstream cg-client {
        server cg-client:80;
        keepalive 32;
        keepalive_requests 1000;
        keepalive_timeout 75s;
    }

    # HTTP server (handling all traffic from the ALB)
    server {
        listen 80;
        server_name coop.publicai.co;

        # Security headers
        add_header X-Frame-Options SAMEORIGIN;
        add_header X-Content-Type-Options nosniff;
        add_header X-XSS-Protection "1; mode=block";
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        location / {
            proxy_pass http://cg-client;

            # Headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # HTTP/1.1 support
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            # Buffering
            proxy_buffering off;
            proxy_request_buffering off;

            # Timeouts
            proxy_connect_timeout 5s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;

            # File upload size limit
            client_max_body_size 100m;
        }

        location /api {
            proxy_pass http://cg-server;

            # Headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # HTTP/1.1 and WebSockets support
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            # Buffering
            proxy_buffering off;
            proxy_request_buffering off;

            # Timeouts
            proxy_connect_timeout 5s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;

            # File upload size limit
            client_max_body_size 100m;
        }

        location /graphql {
            proxy_pass http://cg-server;

            # Headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # HTTP/1.1 and WebSockets support
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            # Buffering
            proxy_buffering off;
            proxy_request_buffering off;

            # Timeouts
            proxy_connect_timeout 5s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
        }
    }
}